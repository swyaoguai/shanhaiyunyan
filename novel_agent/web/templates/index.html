<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文思Agent - 智能小说创作</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <!-- 本地化字体和图标 - 避免外部CDN依赖 -->
    <link rel="stylesheet" href="/static/fonts/fonts.css?v=1.0">
    <link rel="stylesheet" href="/static/icons/remixicon.css?v=3.5.1">
    <link rel="stylesheet" href="/static/style.css?v=3.19">
</head>

<body>
    <!-- 背景层 -->
    <div id="app-bg"></div>
    <div id="app-overlay"></div>

    <div class="workbench">
        <!-- 1. 资源栏 (极左) -->
        <aside class="resource-bar">
            <div class="logo">
                <img src="/static/logo.png" alt="文思Agent" style="width: 32px; height: 32px; border-radius: 6px;">
            </div>

            <div class="res-group">
                <button type="button" class="res-item active" data-module="dashboard" title="仪表盘" aria-label="打开仪表盘">
                    <i class="ri-dashboard-line"></i>
                </button>
                <button type="button" class="res-item" data-module="infinite-write" title="无限续写" aria-label="打开无限续写">
                    <i class="ri-infinity-line"></i>
                </button>
                <button type="button" class="res-item" data-module="short-story" title="短篇创作" aria-label="打开短篇创作">
                    <i class="ri-draft-line"></i>
                </button>
                <button type="button" class="res-item" data-module="novel-to-script" title="小说转剧本" aria-label="打开小说转剧本">
                    <i class="ri-movie-2-line"></i>
                </button>
                <button type="button" class="res-item" data-module="write" title="协作创作" aria-label="打开协作创作">
                    <i class="ri-quill-pen-line"></i>
                </button>
                <button type="button" class="res-item" data-module="world" title="资料库" aria-label="打开资料库">
                    <i class="ri-book-mark-line"></i>
                </button>
                <button type="button" class="res-item" data-module="aux-memory" title="长期记忆中心" aria-label="打开长期记忆中心">
                    <i class="ri-brain-line"></i>
                </button>
            </div>

            <div class="res-group bottom">
                <!-- 侧边栏收缩按钮 -->
                <button type="button" class="res-item" id="sidebar-toggle-btn" title="收缩/展开侧边栏" aria-label="收缩或展开侧边栏">
                    <i class="ri-side-bar-line"></i>
                </button>
                <button type="button" class="res-item" data-module="settings" title="设置" aria-label="打开设置">
                    <i class="ri-settings-4-line"></i>
                </button>
                <button type="button" class="res-item" data-module="about" title="关于" aria-label="打开关于">
                    <i class="ri-information-line"></i>
                </button>
            </div>
        </aside>

        <!-- 2. 导航栏 (侧边) -->
        <nav class="nav-panel" id="nav-panel">
            <!-- 项目选择器 -->
            <div class="project-selector">
                <button type="button" class="project-current" id="project-current" aria-haspopup="true" aria-expanded="false">
                    <i class="ri-book-2-line"></i>
                    <span id="current-project-name">加载中...</span>
                    <i class="ri-arrow-down-s-line"></i>
                </button>
                <div class="project-dropdown hidden" id="project-dropdown">
                    <div id="project-list">
                        <!-- 动态生成 -->
                    </div>
                    <button type="button" class="project-add" id="project-add">
                        <i class="ri-add-line"></i> 新建小说项目
                    </button>
                </div>
            </div>

            <div class="nav-header">
                <h3 id="nav-title">仪表盘</h3>
                <div class="nav-actions">
                    <button type="button" class="icon-btn nav-action-btn" id="nav-action-add" title="添加内容" aria-label="添加内容">
                        <i class="ri-add-line"></i>
                    </button>
                </div>
            </div>

            <div class="nav-content scrollbar-hide">
                <!-- 动态内容 -->
                <div id="nav-list-container"></div>
            </div>
        </nav>

        <!-- 3. 主工作区 -->
        <main class="workspace" id="workspace">
            <div class="workspace-header">
                <div class="breadcrumbs" id="breadcrumbs">
                    <span>我的项目</span>
                    <i class="ri-arrow-right-s-line"></i>
                    <span class="current">概览</span>
                </div>
                <div class="workspace-actions">
                    <button type="button" class="icon-btn" id="toggle-focus" title="专注模式"><i
                            class="ri-fullscreen-line"></i></button>
                </div>
            </div>

            <div class="workspace-content scrollbar-custom" id="main-view">
                <!-- 视图内容挂载点 -->
                <div class="empty-state">
                    <i class="ri-quill-pen-line"></i>
                    <h2>开始你的创作</h2>
                </div>
            </div>
        </main>

        <!-- 4. Copilot (右侧可拖动) -->
        <aside class="copilot-panel collapsed" id="copilot-panel">
            <div class="copilot-drag-handle" id="copilot-drag-handle"></div>
            <div class="copilot-header">
                <i class="ri-sparkling-fill" style="color: var(--accent-color);"></i>
                <div class="copilot-title-group">
                    <span>文思创作助手</span>
                    <div class="copilot-session-meta">
                        <span id="copilot-session-mode">模式：未进入创作</span>
                        <span id="copilot-session-agent">子Agent：待机</span>
                    </div>
                </div>
                <div style="flex: 1;"></div>
                <button class="icon-btn session-list-btn" id="copilot-session-list-btn" title="会话列表"><i
                        class="ri-list-check-2"></i></button>
                <button class="icon-btn new-chat-btn" id="new-chat-btn" title="新建会话"><i
                        class="ri-chat-new-line"></i></button>
            </div>
            <div class="copilot-session-menu hidden" id="copilot-session-menu"></div>
            <div class="copilot-workflow-panel hidden" id="copilot-workflow-panel" role="status" aria-live="polite"></div>
            <div class="copilot-body scrollbar-custom" id="copilot-messages">
                <div class="msg ai">你好！我是文思创作助手。试试：
                    • 输入 <b>@</b> 引用角色、章节或设定
                    • 直接提问或发指令</div>
            </div>
            <div class="copilot-input">
                <!-- @引用提示框 - 必须在copilot-input内部才能正确定位 -->
                <div id="mention-popup" class="mention-popup hidden">
                    <!-- 动态生成候选列表 -->
                </div>
                <div class="copilot-input-resize-handle" id="copilot-resize-handle" title="拖动调整输入框高度"></div>
                <div class="copilot-input-wrapper">
                    <textarea id="copilot-input-text" placeholder="输入内容，@ 可引用角色/章节，输入 / 查看命令；直接中文会按自然语言理解..." rows="2"></textarea>
                    <button id="copilot-send-btn" title="发送"><i class="ri-send-plane-fill"></i></button>
                </div>
            </div>
            <button class="icon-btn close-copilot copilot-side-toggle-open" title="收起助手">
                <i class="ri-arrow-right-s-line"></i>
            </button>
        </aside>
        <button type="button" class="icon-btn edge-toggle-copilot" id="toggle-copilot" title="文思创作助手">
            <i class="ri-arrow-left-s-line"></i>
        </button>
    </div>

    <!-- 模态框容器 -->
    <div id="modal-container" class="hidden"></div>

    <!-- Toast -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite">操作成功</div>

    <!-- 按正确顺序加载模块化脚本 -->
    <!-- 0. Markdown 渲染库 -->
    <script src="/static/lib/marked.min.js?v=15.0.7"></script>
    <!-- 1. 工具函数（无依赖） -->
    <script src="/static/app-utils.js?v=1.3"></script>
    <!-- 2. 主题设置（依赖 utils） -->
    <script src="/static/app-theme.js?v=1.1"></script>
    <!-- 3. 核心状态和初始化（依赖 utils, theme） -->
    <script src="/static/app-core.js?v=1.16"></script>
    <!-- 4. 导航渲染（依赖 core） -->
    <script src="/static/app-nav.js?v=1.1"></script>
    <!-- 5. 资料库管理（依赖 core, nav） -->
    <script src="/static/app-knowledge.js?v=1.2"></script>
    <!-- 5.1 辅助记忆中心（依赖 core, nav） -->
    <script src="/static/app-aux-memory.js?v=1.2"></script>
    <!-- 6. 章节管理（依赖 core, nav） -->
    <script src="/static/app-chapters.js?v=1.2"></script>
    <!-- 7. 设置模块（依赖 core, theme） -->
    <script src="/static/settings/app-settings-helpers.js?v=1.0"></script>
    <script src="/static/settings/app-settings-api.js?v=1.0"></script>
    <script src="/static/settings/app-settings-renderers.js?v=1.0"></script>
    <script src="/static/settings/app-settings-events.js?v=1.0"></script>
    <script src="/static/app-settings.js?v=2.0"></script>
    <!-- 7.1 备份与资料库管理（依赖 core, settings） -->
    <script src="/static/app-backup-resources.js?v=1.0"></script>
    <!-- 8. Copilot增强（依赖 core） -->
    <script src="/static/app-copilot.js?v=1.2"></script>
    <!-- 8.1 工作流自动保存模块（依赖 core, copilot） -->
    <script src="/static/app-workflow-auto-save.js?v=1.0"></script>
    <!-- 9. 项目管理（依赖 core） -->
    <script src="/static/app-project.js?v=1.5"></script>
    <!-- 10. 连续写作功能 -->
    <script src="/static/continuous_write.js?v=2.1"></script>
    <!-- 10.1 短篇创作固定面板 -->
    <script src="/static/short-story/short-story-state.js?v=1.6"></script>
    <script src="/static/short-story/short-story-formatters.js?v=1.5"></script>
    <script src="/static/short-story/short-story-api.js?v=1.3"></script>
    <script src="/static/short-story/short-story-render.js?v=2.0"></script>
    <script src="/static/short-story/short-story-events.js?v=1.4"></script>
    <script src="/static/app-short-story.js?v=2.0"></script>
    <!-- 10.2 小说转剧本独立工作台 -->
    <script src="/static/novel-to-script/novel-to-script-state.js?v=1.0"></script>
    <script src="/static/novel-to-script/novel-to-script-api.js?v=1.0"></script>
    <script src="/static/novel-to-script/novel-to-script-render.js?v=1.0"></script>
    <script src="/static/novel-to-script/novel-to-script-events.js?v=1.0"></script>
    <script src="/static/app-novel-to-script.js?v=1.0"></script>
    <!-- 10.1 无限续写章节编辑器 -->
    <script src="/static/iw-editor.js?v=1.0"></script>
    <!-- 11. 提示词管理 -->
    <script src="/static/prompt_manager.js?v=2.0"></script>
    <!-- 12. Token统计 -->
    <script src="/static/app-token-stats.js?v=1.0"></script>
    <!-- 13. 热点/热梗搜索 -->
    <script src="/static/app-trends.js?v=1.5"></script>

    <!-- 13. 初始化应用 -->
    <script>
        // 等待DOM加载完成后初始化
        document.addEventListener('DOMContentLoaded', function () {
            console.log('[App] DOM加载完成，开始初始化...');
            if (typeof init === 'function') {
                init().then(() => {
                    console.log('[App] 应用初始化完成');
                }).catch(err => {
                    console.error('[App] 初始化失败:', err);
                });
            } else {
                console.error('[App] init函数未定义，请检查app-core.js是否正确加载');
            }
        });
    </script>
</body>

</html>
